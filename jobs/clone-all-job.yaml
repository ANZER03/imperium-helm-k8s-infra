apiVersion: v1
kind: ConfigMap
metadata:
  name: clone-all-script
data:
  clone.py: |
    import os
    import psycopg2
    from psycopg2.extras import execute_values

    source_uri = os.getenv("SOURCE_URI", "postgresql://postgres:postgres@172.18.0.2:5432/imperium-news-source")
    target_uri = os.getenv("TARGET_URI", "postgresql://imperium:imperium-secret@imperium-pg-rw:5432/imperium")

    def get_columns(cursor, table_name):
        cursor.execute("""
            SELECT column_name 
            FROM information_schema.columns 
            WHERE table_schema = 'public' AND table_name = %s 
            ORDER BY ordinal_position;
        """, (table_name,))
        return [row[0] for row in cursor.fetchall()]

    def clone_table(conn_src, conn_tgt, table_name, chunk_size=500000):
        print(f"\n--- Starting clone for {table_name} ---")
        cur_src = conn_src.cursor()
        cur_tgt = conn_tgt.cursor()

        columns = get_columns(cur_src, table_name)
        if not columns:
            print(f"Table {table_name} not found or has no columns. Skipping.")
            return

        cols_str = ", ".join(columns)
        
        # Build the ON CONFLICT clause
        non_pk_cols = [c for c in columns if c != 'id']
        if non_pk_cols:
            update_str = ", ".join([f"{c} = EXCLUDED.{c}" for c in non_pk_cols])
            upsert_query = f"""
                INSERT INTO {table_name} ({cols_str})
                VALUES %s
                ON CONFLICT (id) DO UPDATE SET {update_str};
            """
        else:
            upsert_query = f"""
                INSERT INTO {table_name} ({cols_str})
                VALUES %s
                ON CONFLICT (id) DO NOTHING;
            """

        # Check if table is large and has an 'id' column to chunk by
        is_large = table_name in ('table_authority', 'table_links')
        
        if is_large and 'id' in columns:
            cur_src.execute(f"SELECT MIN(id), MAX(id) FROM {table_name};")
            min_id, max_id = cur_src.fetchone()
            if min_id is None or max_id is None:
                print(f"Table {table_name} is empty. Skipping.")
                return

            print(f"Cloning {table_name} in chunks. Min ID: {min_id}, Max ID: {max_id}, Chunk Size: {chunk_size}")
            current_id = min_id
            while current_id <= max_id:
                next_id = current_id + chunk_size
                print(f"Fetching chunk {current_id} to {next_id}...")
                
                cur_src.execute(f"SELECT {cols_str} FROM {table_name} WHERE id >= %s AND id < %s;", (current_id, next_id))
                rows = cur_src.fetchall()
                
                if rows:
                    print(f"Inserting {len(rows)} rows...")
                    execute_values(cur_tgt, upsert_query, rows, page_size=2000)
                    conn_tgt.commit()
                
                current_id = next_id
        else:
            print(f"Cloning {table_name} in a single batch...")
            cur_src.execute(f"SELECT {cols_str} FROM {table_name};")
            rows = cur_src.fetchall()
            if rows:
                print(f"Inserting {len(rows)} rows...")
                execute_values(cur_tgt, upsert_query, rows, page_size=2000)
                conn_tgt.commit()

        print(f"Finished cloning {table_name}!")
        cur_src.close()
        cur_tgt.close()

    def main():
        print("Connecting to source and target databases...")
        conn_src = psycopg2.connect(source_uri)
        conn_tgt = psycopg2.connect(target_uri)

        tables = [
            'table_pays',
            'table_langue',
            'table_sedition',
            'table_rubrique',
            'table_authority',
            'table_links'
        ]

        for table in tables:
            try:
                clone_table(conn_src, conn_tgt, table)
            except Exception as e:
                print(f"Failed to clone table {table}: {e}")
                conn_tgt.rollback()
                raise e

        conn_src.close()
        conn_tgt.close()
        print("\nAll tables cloned successfully!")

    if __name__ == "__main__":
        main()

---
apiVersion: batch/v1
kind: Job
metadata:
  name: clone-all-job
spec:
  backoffLimit: 1
  template:
    spec:
      containers:
      - name: cloner
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
          - pip install psycopg2-binary && python -u /scripts/clone.py
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
        env:
        - name: SOURCE_URI
          value: "postgresql://postgres:postgres@172.18.0.2:5432/imperium-news-source"
        - name: TARGET_URI
          value: "postgresql://imperium:imperium-secret@imperium-pg-rw:5432/imperium"
      restartPolicy: Never
      volumes:
      - name: script-volume
        configMap:
          name: clone-all-script
