---
apiVersion: batch/v1
kind: Job
metadata:
  name: refresh-topic-embeddings-job
spec:
  backoffLimit: 1
  template:
    spec:
      containers:
      - name: refresher
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
          - pip install psycopg2-binary && python -u /app/refresh.py
        volumeMounts:
        - name: app-volume
          mountPath: /app
        env:
        - name: TARGET_URI
          value: "postgresql://imperium:imperium-secret@imperium-pg-rw:5432/imperium"
        - name: LLAMA_CPP_BASE_URL
          value: "http://imperium-streaming-news-processing-llama-cpp:8080"
        - name: EMBEDDING_MODEL
          value: "embeddinggemma-300M-Q8_0.gguf"
      restartPolicy: Never
      volumes:
      - name: app-volume
        configMap:
          name: refresh-topic-embeddings-script
