# Default values for kafka-cluster.
# This is a YAML-formatted file.
fullnameOverride: "imperium-kafka"

kafka:
  # Supported versions by the Strimzi operator (e.g., 4.2.0)
  version: "4.2.0"
  metadataVersion: "4.2-IV0"
  
  # Kafka configurations
  config:
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2

  # Listener configurations
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true

# Node Pools configuration for KRaft mode
nodePools:
  # Pool with combined roles (Broker and Controller) acting as control plane (masters)
  - name: controller-broker
    replicas: 2
    roles:
      - controller
      - broker
    storage:
      type: persistent-claim
      size: 50Gi
      class: "" # Set to empty to use the default storage class, or specify a custom one
      deleteClaim: false
    resources:
      requests:
        memory: 2Gi
        cpu: "1"
      limits:
        memory: 4Gi
        cpu: "2"

  # Pool with Broker role only
  - name: broker
    replicas: 1
    roles:
      - broker
    storage:
      type: persistent-claim
      size: 50Gi
      class: "" # Set to empty to use the default storage class, or specify a custom one
      deleteClaim: false
    resources:
      requests:
        memory: 2Gi
        cpu: "1"
      limits:
        memory: 4Gi
        cpu: "2"
