apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-to-kafka-connect
  labels:
    {{- include "kafka-connect.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ include "kafka-connect.fullname" . }}
      strimzi.io/kind: KafkaConnect
      strimzi.io/name: {{ include "kafka-connect.fullname" . }}-connect
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8083
