replicaCount: 1

image:
  repository: registry.registry.svc.cluster.local:5000/imperium-elasticsearch-projector
  pullPolicy: IfNotPresent
  tag: "1.0.0"

env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: "imperium-kafka-kafka-bootstrap:9092"
  - name: SCHEMA_REGISTRY_URL
    value: "http://imperium-streaming-news-processing-schema-registry:8081"
  - name: CANONICAL_TOPIC
    value: "imperium.canonical-articles"
  - name: ELASTICSEARCH_URL
    value: "http://elasticsearch-service:9200"
  - name: ELASTICSEARCH_INDEX
    value: "imperium_articles_search"
  - name: KAFKA_GROUP_ID
    value: "imperium-elasticsearch-projector-canonical-group"
