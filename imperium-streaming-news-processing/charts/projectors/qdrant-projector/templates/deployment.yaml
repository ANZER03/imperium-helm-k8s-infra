apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qdrant-projector.fullname" . }}
  labels:
    {{- include "qdrant-projector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qdrant-projector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qdrant-projector.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
