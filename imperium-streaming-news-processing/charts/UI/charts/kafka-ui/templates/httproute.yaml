apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kafka-ui.fullname" . }}-route
  labels:
    {{- include "kafka-ui.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: kong
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /kafka
    backendRefs:
    - name: {{ include "kafka-ui.fullname" . }}
      port: {{ .Values.service.port }}
