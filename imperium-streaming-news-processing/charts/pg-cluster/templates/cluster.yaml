apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "pg-cluster.fullname" . }}
  labels:
    {{- include "pg-cluster.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName | quote }}

  storage:
    size: {{ .Values.cluster.storage.size | quote }}
    {{- if .Values.cluster.storage.storageClass }}
    storageClassName: {{ .Values.cluster.storage.storageClass | quote }}
    {{- end }}

  {{- if .Values.cluster.resources }}
  resources:
    {{- toYaml .Values.cluster.resources | nindent 4 }}
  {{- end }}

  bootstrap:
    initdb:
      database: {{ .Values.cluster.bootstrap.initdb.database | quote }}
      owner: {{ .Values.cluster.bootstrap.initdb.owner | quote }}
      secret:
        name: {{ include "pg-cluster.fullname" . }}-auth
      {{- if .Values.initScripts }}
      postInitApplicationSQLRefs:
        configMapRefs:
          {{- range $filename, $_ := .Values.initScripts }}
          - name: {{ include "pg-cluster.fullname" $ }}-init-scripts
            key: {{ $filename }}
          {{- end }}
      {{- end }}

  monitoring:
    enablePodMonitor: {{ .Values.cluster.monitoring.enablePodMonitor }}
