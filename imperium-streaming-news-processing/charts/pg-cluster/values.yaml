            more_inner_text text NOT NULL DEFAULT ''::text,
            more_reporter text NOT NULL DEFAULT ''::text,
            more_date_text text NOT NULL DEFAULT ''::text,
            more_image_url text NOT NULL DEFAULT ''::text,
            more_image_down boolean NOT NULL DEFAULT false,
            more_source_html_down boolean NOT NULL DEFAULT false,
            more_hash text NOT NULL,
            more_image_extension_id integer NOT NULL DEFAULT 0,
            more_image_size integer NOT NULL DEFAULT 0,
            article_id integer NOT NULL DEFAULT 0,
            article_applic_contenu_id integer NOT NULL DEFAULT 0,
            langue_id integer NOT NULL DEFAULT 0,
            langue_id_updated boolean NOT NULL DEFAULT false,
            more_title_updated boolean NOT NULL DEFAULT false,
            more_inner_text_updated boolean NOT NULL DEFAULT false,
            valide boolean NOT NULL DEFAULT false,
            checked boolean NOT NULL DEFAULT false,
            to_delete boolean NOT NULL DEFAULT false,
            more_meta_keywords text NOT NULL DEFAULT ''::text,
            more_meta_description text NOT NULL DEFAULT ''::text,
            more_trad_fr text NOT NULL DEFAULT ''::text,
            ss_jpg boolean NOT NULL DEFAULT false,
            ss_pdf boolean NOT NULL DEFAULT false,
            ss_jpg_size integer NOT NULL DEFAULT 0,
            ss_pdf_size integer NOT NULL DEFAULT 0,
            indexed boolean NOT NULL DEFAULT false,
            indexed_in timestamp without time zone NOT NULL DEFAULT now(),
            rubrique_id integer NOT NULL DEFAULT 0,
            rubric_checked boolean NOT NULL DEFAULT false,
            more_date_checked boolean,
            more_date_error_id integer,
            more_date_regex_text text,
            more_source_html character varying(256),
            readability boolean DEFAULT false,
            ss_rct boolean,
            ss_rct_size integer,
            authority_id integer DEFAULT 0,
            more_video_url text,
            indexed_s boolean,
            queried boolean,
            isvideo boolean NOT NULL DEFAULT false,
            pubdate timestamp without time zone,
            crawl_date timestamp without time zone,
            micro_service_id integer,
            article_payant boolean,
            CONSTRAINT table_news_pk PRIMARY KEY (id)
        );
    04_debezium_signal.sql: |
        CREATE TABLE IF NOT EXISTS public.debezium_signal
        (
            id VARCHAR(50) PRIMARY KEY,
            type VARCHAR(50) NOT NULL,
            data VARCHAR(2048) NULL
        );
    05_publications.sql: |
        DO $$
        BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'imperium_reference_publication') THEN
                CREATE PUBLICATION imperium_reference_publication FOR TABLE public.table_pays, public.table_langue, public.table_rubrique, public.table_sedition;
            END IF;

            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'imperium_metadata_publication') THEN
                CREATE PUBLICATION imperium_metadata_publication FOR TABLE public.table_authority, public.table_links, public.debezium_signal;
            END IF;

            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'imperium_news_publication') THEN
                CREATE PUBLICATION imperium_news_publication FOR TABLE public.table_news, public.debezium_signal;
            END IF;
        END
        $$;
