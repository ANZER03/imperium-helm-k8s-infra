image:
  repository: "registry.registry.svc.cluster.local:5000/imperium-canonical-enrichment-driver"
  tag: "1.0.0"

kafka:
  bootstrapServers: "imperium-kafka-kafka-bootstrap:9092"

schemaRegistry:
  url: "http://imperium-streaming-news-processing-schema-registry:8081"

postgres:
  dsn: "postgresql://imperium:imperium-secret@imperium-pg-rw:5432/imperium"

checkpoints:
  root: "/tmp/imperium/checkpoints/processing"

spark:
  serviceAccount: ""
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
  executor:
    instances: 1
    cores: 1
    memory: "1g"
