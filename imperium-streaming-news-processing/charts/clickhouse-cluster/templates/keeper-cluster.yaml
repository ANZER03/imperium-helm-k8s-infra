apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: {{ include "clickhouse-cluster.fullname" . }}-keeper
  labels:
    {{- include "clickhouse-cluster.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keeper.replicas }}
  podTemplate:
    metadata:
      labels:
        app: {{ include "clickhouse-cluster.fullname" . }}-keeper
    spec:
      {{- if .Values.keeper.antiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - {{ include "clickhouse-cluster.fullname" . }}-keeper
              topologyKey: {{ .Values.keeper.antiAffinity.topologyKey | quote }}
      {{- end }}
      containers:
        - name: keeper
          {{- if .Values.keeper.resources }}
          resources:
            {{- toYaml .Values.keeper.resources | nindent 12 }}
          {{- end }}
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: {{ .Values.keeper.storage.size | quote }}
    {{- if .Values.keeper.storage.storageClass }}
    storageClassName: {{ .Values.keeper.storage.storageClass | quote }}
    {{- end }}
