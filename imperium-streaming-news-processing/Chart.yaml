apiVersion: v2
name: imperium-streaming-news-processing
description: Umbrella Helm chart for Imperium streaming news processing pipeline sub-charts

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 0.1.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "1.16.0"

dependencies:
  - name: strimzi-kafka-operator
    version: 1.0.1
    repository: "https://strimzi.io/charts"
  - name: spark-operator
    version: 2.5.1
    repository: "https://kubeflow.github.io/spark-operator"
  - name: llama-cpp
    version: 0.1.0
    repository: "file://charts/llama-cpp"
    condition: llama-cpp.enabled
  - name: kafka-connect-connectors
    version: 0.1.0
    repository: "file://charts/kafka-connect-connectors"
    condition: kafka-connect-connectors.enabled
  - name: kafka-connect-sinks
    version: 0.1.0
    repository: "file://charts/kafka-connect-sinks"
    condition: kafka-connect-sinks.enabled
  - name: redis-projector
    version: 0.1.0
    repository: "file://charts/projectors/redis-projector"
    condition: redis-projector.enabled
  - name: postgres-projector
    version: 0.1.0
    repository: "file://charts/projectors/postgres-projector"
    condition: postgres-projector.enabled
  # NOTE: clickstack-operators is installed as a separate Helm release (prerequisite for CRDs)
  - name: clickstack
    version: 3.0.0
    repository: "https://clickhouse.github.io/ClickStack-helm-charts"
    condition: clickstack.enabled
  - name: clickhouse-cluster
    version: 0.1.0
    repository: "file://charts/clickhouse-cluster"
    condition: clickhouse-cluster.enabled
  - name: imperium-news-app
    version: 0.1.0
    repository: "file://charts/imperium-news-app"
    condition: imperium-news-app.enabled
  - name: imperium-frontend
    version: 0.1.0
    repository: "file://charts/imperium-frontend"
    condition: imperium-frontend.enabled
  - name: kong-gateway
    version: 0.1.0
    repository: "file://charts/kong-gateway"
    condition: kong-gateway.enabled
