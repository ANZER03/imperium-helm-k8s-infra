# Default values for imperium-streaming-news-processing.
# This is an umbrella chart. Values for sub-charts can be configured here.
#
# Example:
# sub-chart-name:
#   key: value

strimzi-kafka-operator:
  createGlobalResources: false

kafka-cluster:
  enabled: true

UI:
  enabled: true
  kafka-ui:
    kafka:
      schemaRegistry: "http://imperium-streaming-news-processing-schema-registry:8081"
      kafkaConnectAddress: "http://imperium-streaming-news-processing-kafka-connect-connect-api:8083"
  pgadmin:
    enabled: true
  redisinsight:
    enabled: true

schema-registry:
  enabled: true
  kafka:
    bootstrapServers: "imperium-kafka-kafka-bootstrap:9092"

kafka-connect:
  enabled: true
  replicaCount: 1
  image:
    repository: "registry.registry.svc.cluster.local:5000/debezium-avro"
    tag: "1.1.4"

  kafka:
    bootstrapServers: "imperium-kafka-kafka-bootstrap:9092"
  config:
    schemaRegistryUrl: "http://imperium-streaming-news-processing-schema-registry:8081"
  otel:
    enabled: true
    collectorEndpoint: "http://imperium-streaming-news-processing-opentelemetry-collector:4317"

opentelemetry-collector:
  enabled: true
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
  extraEnvs:
    - name: REDIS_PASSWORD
      value: ""
  config:
    exporters:
      clickhouse:
        endpoint: tcp://imperium-clickhouse-clickhouse-headless:9000?dial_timeout=10s
        database: default
        logs_table_name: otel_logs
        metrics_table_name: otel_metrics
        traces_table_name: otel_traces
        ttl: 336h
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
    receivers:
      redis:
        endpoint: imperium-streaming-news-processing-redis:6379
        collection_interval: 10s
    service:
      pipelines:
        logs:
          exporters: [debug, clickhouse]
          processors: [memory_limiter, batch]
          receivers: [otlp]
        metrics:
          exporters: [debug, clickhouse]
          processors: [memory_limiter, batch]
          receivers: [otlp, prometheus]
        traces:
          exporters: [debug, clickhouse]
          processors: [memory_limiter, batch]
          receivers: [otlp, jaeger, zipkin]
        metrics/redis:
          exporters: [debug, clickhouse]
          processors: [memory_limiter, batch]
          receivers: [redis]

cloudnative-pg: {} # use operator defaults

redis:
  enabled: true

llama-cpp:
  enabled: true

kafka-connect-connectors:
  enabled: true
  postgres:
    host: imperium-pg-rw
    port: 5432
    database: imperium
    user: debezium
    password: "debezium-secret"
  kafka:
    bootstrapServers: "imperium-kafka-kafka-bootstrap:9092"
  schemaRegistry:
    url: "http://imperium-streaming-news-processing-schema-registry:8081"
  connect:
    clusterName: "imperium-streaming-news-processing-kafka-connect"
  # Snapshot connectors disabled per user request
  reference:
    enabled: true
  metadata:
    enabled: true
  news:
    enabled: true
  # Test connectors (off by default; flip to true to validate CDC)
  testSnapshot:
    enabled: false
  testStream:
    enabled: false

kafka-connect-sinks:
  enabled: true
  postgres:
    host: imperium-pg-rw
    port: 5432
    database: imperium
    appUser: "imperium"
    appPassword: "imperium-secret"
  kafka:
    bootstrapServers: "imperium-kafka-kafka-bootstrap:9092"
  connect:
    clusterName: "imperium-streaming-news-processing-kafka-connect"
  countriesSink:
    enabled: true
  languagesSink:
    enabled: true
  authoritiesSink:
    enabled: true
    name: "imperium-authorities-sink-v3"
    tasksMax: 1
  rubricsSink:
    enabled: true
  seditionsSink:
    enabled: true
  linksSink:
    enabled: true
    name: "imperium-links-sink-v3"
    tasksMax: 1

spark-operator:
  spark:
    jobNamespaces:
      - imperium-news-ns

redis-projector:
  enabled: true

postgres-projector:
  enabled: true

clickstack-operators: {} # use operator defaults (bundles ClickHouse + MongoDB operators)

clickstack:
  enabled: true
  fullnameOverride: "imperium-clickstack"
  # Disable bundled OTel collector — conflicts with our existing opentelemetry-collector
  # (both use the same upstream chart, causing Helm template name collisions)
  otel-collector:
    enabled: false

clickhouse-cluster:
  enabled: true

imperium-news-app:
  enabled: true

imperium-frontend:
  enabled: true
